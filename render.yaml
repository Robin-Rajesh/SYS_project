services:
  # ─────────────────────────────────────────────
  # BACKEND SERVICE (Python FastAPI)
  # ─────────────────────────────────────────────
  - type: web
    name: data-analyst-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: 8000
      - key: GOOGLE_API_KEY
        sync: false # Set this securely in Render dashboard
      # Set your database URL in the dashboard if using Cloud Postgres
      #- key: SUPABASE_DB_URL
      #  sync: false

  # ─────────────────────────────────────────────
  # FRONTEND STATIC SITE (React)
  # ─────────────────────────────────────────────
  - type: web
    name: data-analyst-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/build"
    # Ensure client-side routing works for React (Fallback to index.html)
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: data-analyst-backend
          envVarKey: RENDER_EXTERNAL_URL
